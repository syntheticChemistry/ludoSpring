[package]
name = "ludospring-forge"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "Hardware discovery and cross-substrate dispatch for ludoSpring"
license.workspace = true

[dependencies]
barracuda = { path = "../../../barraCuda/crates/barracuda" }
ludospring-barracuda = { path = "../../barracuda", default-features = false }

wgpu = { version = "28", default-features = false, features = [
    "wgsl",
    "vulkan-portability",
] }

serde_json = "1"
tokio = { version = "1", features = ["rt"] }
pollster = "0.4"

[[bin]]
name = "validate_dispatch_routing"
path = "src/bin/validate_dispatch_routing.rs"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
expect_used = "deny"
unwrap_used = "deny"
doc_markdown = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
return_self_not_must_use = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
