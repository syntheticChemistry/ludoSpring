# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Game Loop Continuous — 60Hz storytelling via primal composition.
#
# The full RPGPT storytelling loop expressed as a biomeOS Continuous graph.
# Each tick: evaluate flow → DDA recommend → AI narrate → render → provenance.
#
# No ludoSpring process. Just primals composed at 60Hz.
#
# biomeOS v2.80: session lifecycle (start/pause/resume/stop) works.
# Node execution routes through NeuralRouter to capability domains.
# barraCuda math.sigmoid for flow, activation.* for psychomotor models.
# Continuous executor needs <16ms per capability.call hop for 60Hz budget.
#
# Related: exp088 (continuous game loop), exp074 (dialogue flow monitoring),
#          exp093 (full game session via Continuous composition)
# Reference: primalSpring graphs/science/gaming_mesh_chimera.toml,
#            primalSpring graphs/gen4/gen4_storytelling_full.toml
#
# STATUS: Active (Apr 25, 2026) — V51 typed composition, interaction loop,
#         barraCuda 30 methods on IPC, graph.execute E2E still evolving

[graph]
name = "ludospring_game_loop_continuous"
version = "0.2.0"
description = "60Hz storytelling loop — pure primal composition"
coordination = "Continuous"
tick_hz = 60

[[graph.node]]
name = "evaluate_flow"
order = 0
by_capability = "math"
health_method = "health.check"
spawn = false
depends_on = []
capabilities = ["math.sigmoid"]

[[graph.node]]
name = "dda_recommend"
order = 1
by_capability = "activation"
health_method = "health.check"
spawn = false
depends_on = ["evaluate_flow"]
capabilities = ["activation.fitts", "activation.hick"]

[[graph.node]]
name = "ai_narrate"
order = 2
by_capability = "ai"
health_method = "health.liveness"
spawn = false
depends_on = ["dda_recommend"]
required = false
capabilities = ["ai.query"]

[[graph.node]]
name = "render_scene"
order = 3
by_capability = "visualization"
health_method = "health.liveness"
spawn = false
depends_on = ["ai_narrate"]
required = false
capabilities = ["visualization.render.scene"]

[[graph.node]]
name = "poll_interaction"
order = 4
by_capability = "visualization"
health_method = "health.liveness"
spawn = false
depends_on = ["render_scene"]
required = false
capabilities = ["interaction.poll"]

[[graph.node]]
name = "provenance_stamp"
order = 5
by_capability = "dag"
health_method = "health.liveness"
spawn = false
depends_on = ["poll_interaction"]
required = false
capabilities = ["dag.event.append"]

[[graph.node]]
name = "crypto_sign"
order = 6
by_capability = "security"
health_method = "health.check"
spawn = false
depends_on = ["provenance_stamp"]
required = false
capabilities = ["crypto.sign"]
