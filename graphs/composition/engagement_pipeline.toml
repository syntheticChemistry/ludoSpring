# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Engagement Pipeline — streaming science via Neural API.
#
# A Pipeline-coordination graph that computes engagement metrics by
# streaming data through multiple normalize stages. Each stage calls
# stats.mean via barraCuda IPC, then the composite node calls
# stats.weighted_mean to produce the final engagement score.
#
# biomeOS `graph.execute_pipeline` routes per-stream-item through
# NeuralRouter. barraCuda Sprint 23+ exposes stats.mean, stats.std_dev,
# stats.weighted_mean — all normalize + composite ops are now available.
#
# Related: exp087 (Neural API pipeline), exp010 (engagement curves),
#          exp092 (GOMS + Four Keys via Pipeline)
# Reference: primalSpring graphs/spring_validation/composition_game_science_validate.toml
#
# STATUS: Active (Mar 30, 2026) — V36 barraCuda IPC gaps resolved,
#         Pipeline orchestration + node math both available

[graph]
name = "ludospring_engagement_pipeline"
version = "0.2.0"
description = "Engagement composite as streaming Pipeline composition"
coordination = "Pipeline"

[[graph.node]]
name = "normalize_apm"
order = 0
by_capability = "stats"
health_method = "health.check"
spawn = false
depends_on = []
capabilities = ["stats.mean"]

[[graph.node]]
name = "normalize_exploration"
order = 1
by_capability = "stats"
health_method = "health.check"
spawn = false
depends_on = []
capabilities = ["stats.mean"]

[[graph.node]]
name = "normalize_variety"
order = 2
by_capability = "stats"
health_method = "health.check"
spawn = false
depends_on = []
capabilities = ["stats.mean"]

[[graph.node]]
name = "normalize_completion"
order = 3
by_capability = "stats"
health_method = "health.check"
spawn = false
depends_on = []
capabilities = ["stats.mean"]

[[graph.node]]
name = "normalize_social"
order = 4
by_capability = "stats"
health_method = "health.check"
spawn = false
depends_on = []
capabilities = ["stats.mean"]

[[graph.node]]
name = "composite"
order = 5
by_capability = "stats"
health_method = "health.check"
spawn = false
depends_on = ["normalize_apm", "normalize_exploration", "normalize_variety", "normalize_completion", "normalize_social"]
capabilities = ["stats.weighted_mean"]

[[graph.node]]
name = "persist"
order = 6
by_capability = "storage"
health_method = "health.liveness"
spawn = false
depends_on = ["composite"]
required = false
capabilities = ["storage.store"]
