# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Math Pipeline — barraCuda science via composition.
#
# Engagement composite replicated purely through barraCuda IPC:
# tensor.create (weights + scores) → tensor.scale → tensor.reduce("sum")
#
# barraCuda Sprint 23+ exposes 30 methods: math.*, activation.*, stats.*,
# noise.*, tensor.*, rng.*. All element-wise ops confirmed working (V35.2).
#
# Related: exp084 (math IPC), exp086 (tensor), exp090 (engagement composition)
# Reference: primalSpring graphs/compositions/game_science_standalone.toml
#
# STATUS: Active (Mar 30, 2026) — V36 aligned with biomeOS v2.80 domains

[graph]
name = "ludospring_math_pipeline"
version = "0.2.0"
description = "Engagement composite via barraCuda tensor composition"
coordination = "Sequential"

[[graph.node]]
name = "create_weights"
order = 0
by_capability = "tensor"
health_method = "health.check"
spawn = false
depends_on = []
capabilities = ["tensor.create", "tensor.scale"]

[[graph.node]]
name = "create_scores"
order = 1
by_capability = "tensor"
health_method = "health.check"
spawn = false
depends_on = []
capabilities = ["tensor.create"]

[[graph.node]]
name = "weighted_sum"
order = 2
by_capability = "stats"
health_method = "health.check"
spawn = false
depends_on = ["create_weights", "create_scores"]
capabilities = ["stats.weighted_mean"]

[[graph.node]]
name = "persist_result"
order = 3
by_capability = "storage"
health_method = "health.liveness"
spawn = false
depends_on = ["weighted_sum"]
required = false
capabilities = ["storage.store"]
