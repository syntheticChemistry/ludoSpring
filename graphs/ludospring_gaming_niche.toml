# =============================================================================
# Gaming Niche Deploy Graph
# =============================================================================
#
# Deploys the full gaming niche: security + discovery + math/science +
# visualization + optional compute accelerator + provenance.
#
# Topology:
#   Phase 1: Tower Atomic (BearDog + Songbird)
#   Phase 2: Science + Viz (barraCuda + petalTongue, parallel)
#   Phase 3: Optional accelerators (ToadStool)
#   Phase 4: Validation
#   Phase 5: Provenance Trio (optional, fallback = "skip")
#
# No spring binaries deploy. Game science is served by composing primals:
# barraCuda (math/activation/stats/noise), petalTongue (visualization/
# interaction), Squirrel (AI), and the provenance trio (rhizoCrypt,
# loamSpine, sweetGrass).
#
# Continuous coordination readiness:
#   The game engine niche targets 60 Hz tick-based coordination.
#   Once biomeOS supports Continuous coordination mode, this graph evolves
#   from Sequential deploy to Continuous tick execution.
#
# STATUS: Active (Apr 25, 2026) — V53 pure composition, no spring binary
#
# Usage:
#   biomeos deploy graphs/ludospring_gaming_niche.toml
#
# =============================================================================

[graph]
id = "gaming_niche_deploy"
description = "Gaming niche — ludoSpring + petalTongue atop Tower Atomic"
coordination = "Sequential"

[graph.metadata]
resolve = true
fragments = ["tower_atomic", "node_atomic", "nest_atomic", "meta_tier"]
composition_model = "pure"
owner = "ludoSpring"
domain = "game_science"
particle_profile = "balanced"
transport = "uds_only"
tcp_ports = 0
btsp_enforced = true

# =============================================================================
# Phase 1: Tower Atomic (security + discovery foundation)
# =============================================================================

[[nodes]]
id = "germinate_beardog"
output = "beardog_genesis"
capabilities = ["crypto", "tls_crypto", "genetic", "security"]

[nodes.primal]
by_capability = "security"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
"crypto.generate_keypair" = "crypto.x25519_generate_ephemeral"
"crypto.encrypt" = "crypto.chacha20_poly1305_encrypt"
"crypto.hash" = "crypto.blake3_hash"
"crypto.sign" = "crypto.sign_ed25519"

[[nodes]]
id = "germinate_songbird"
depends_on = ["germinate_beardog"]
output = "songbird_genesis"
capabilities = ["http", "discovery", "secure_http", "tls"]

[nodes.primal]
by_capability = "discovery"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
SONGBIRD_SECURITY_PROVIDER = "beardog"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
"network.http_request" = "http.request"
"network.tls_connect" = "tls.connect"
"discovery.announce" = "announce_capabilities"
"discovery.query" = "discover_by_capability"

# =============================================================================
# Phase 2: Science + Visualization (parallel)
# =============================================================================
# Game science is served by barraCuda (math, activation, stats, noise).
# No ludoSpring binary deploys — the spring validates in Rust (tier 2).

[[nodes]]
id = "germinate_barracuda"
depends_on = ["germinate_beardog", "germinate_songbird"]
output = "barracuda_genesis"
capabilities = ["tensor", "math", "activation", "stats", "noise", "rng"]
fallback = "skip"

[nodes.primal]
by_capability = "tensor"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BIOMEOS_SOCKET_DIR = "${XDG_RUNTIME_DIR}/biomeos"
FAMILY_ID = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
"math.sigmoid" = "math.sigmoid"
"math.log2" = "math.log2"
"activation.fitts" = "activation.fitts"
"activation.hick" = "activation.hick"
"stats.mean" = "stats.mean"
"stats.std_dev" = "stats.std_dev"
"stats.variance" = "stats.variance"
"noise.perlin2d" = "noise.perlin2d"
"rng.uniform" = "rng.uniform"
"tensor.create" = "tensor.create"
"tensor.matmul" = "tensor.matmul"

[[nodes]]
id = "germinate_petaltongue"
depends_on = ["germinate_beardog", "germinate_songbird"]
output = "petaltongue_genesis"
capabilities = ["visualization", "ui", "interaction", "representation"]

[nodes.primal]
by_capability = "visualization"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BIOMEOS_SOCKET_DIR = "${XDG_RUNTIME_DIR}/biomeos"
FAMILY_ID = "${FAMILY_ID}"
SONGBIRD_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/songbird-${FAMILY_ID}.sock"

[nodes.constraints]
timeout_ms = 20000

[nodes.capabilities_provided]
"visualization.render" = "visualization.render"
"visualization.export" = "visualization.export"
"visualization.capabilities" = "visualization.capabilities"
"ui.render" = "ui.render"
"ui.display_status" = "ui.display_status"
"interaction.subscribe" = "interaction.subscribe"
"interaction.poll" = "interaction.poll"
"visualization.render.scene" = "visualization.render.scene"
"visualization.render.stream" = "visualization.render.stream"
"visualization.render.dashboard" = "visualization.render.dashboard"

# =============================================================================
# Phase 3: Optional accelerators
# =============================================================================

[[nodes]]
id = "germinate_toadstool"
depends_on = ["germinate_beardog", "germinate_songbird"]
output = "toadstool_genesis"
capabilities = ["compute", "workload"]
fallback = "skip"

[nodes.primal]
by_capability = "compute"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
SONGBIRD_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/songbird-${FAMILY_ID}.sock"

[nodes.constraints]
timeout_ms = 45000

# NOTE: These use toadstool.* naming; wire protocol uses compute.* — alignment tracked in PRIMAL_GAPS.md
[nodes.capabilities_provided]
"compute.health" = "toadstool.health"
"compute.execute" = "toadstool.execute"
"compute.capabilities" = "toadstool.query_capabilities"

# =============================================================================
# Phase 4: Validate gaming niche
# =============================================================================

[[nodes]]
id = "validate_gaming_niche"
depends_on = ["germinate_beardog", "germinate_songbird", "germinate_barracuda", "germinate_petaltongue"]
output = "gaming_niche_validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_barracuda = true
check_petaltongue = true
timeout_seconds = 20

[nodes.constraints]
timeout_ms = 30000

# =============================================================================
# Phase 5: Provenance Trio (optional — enhances, never blocks)
# =============================================================================

[[nodes]]
id = "provenance_session_start"
depends_on = ["validate_gaming_niche"]
fallback = "skip"

[nodes.operation]
name = "capability_call"

[nodes.operation.params]
capability = "provenance.session_create"
params = { agent = "gaming-niche", experiment_id = "deploy", version = "V23" }

[nodes.constraints]
timeout_ms = 10000

[[nodes]]
id = "provenance_commit"
depends_on = ["provenance_session_start"]
fallback = "skip"

[nodes.operation]
name = "capability_call"

[nodes.operation.params]
capability = "provenance.session_dehydrate"

[nodes.constraints]
timeout_ms = 10000

[[nodes]]
id = "provenance_attribute"
depends_on = ["provenance_commit"]
fallback = "skip"

[nodes.operation]
name = "capability_call"

[nodes.operation.params]
capability = "contribution.recordDehydration"

[nodes.constraints]
timeout_ms = 10000
