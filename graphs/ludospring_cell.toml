# SPDX-License-Identifier: AGPL-3.0-or-later
# Cellular deployment graph: ludoSpring — pure primal composition
#
# Game science via composing existing primals (no spring binary deploys).
# barraCuda provides math/stats/activation; petalTongue renders + receives
# interaction; the provenance trio records sessions.
#
# Synced from primalSpring v2.0 (commit 8bb90fb), adapted for biomeOS
# deploy parser (id-based [[nodes]] format, hyphenated IDs).
#
# Deploy: biomeos deploy --graph graphs/ludospring_cell.toml

[graph]
id = "ludospring-cell"
name = "ludospring-cell"
version = "2.0.0"
description = "ludoSpring — pure primal composition for game science + live viz"
coordination = "sequential"

[graph.metadata]
cell_type = "spring"
domain = "game_science"
security_model = "btsp_enforced"
transport = "uds_only"
composition_model = "pure"
petaltongue_mode = "live"
tick_hz = 60

# ── Tower Atomic ─────────────────────────────────────────────────────

[[nodes]]
id = "beardog"
output = "beardog-ready"
capabilities = ["crypto", "security"]

[nodes.primal]
by_capability = "security"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[[nodes]]
id = "songbird"
depends_on = ["beardog"]
output = "songbird-ready"
capabilities = ["discovery", "network"]

[nodes.primal]
by_capability = "discovery"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

# ── Node Atomic ──────────────────────────────────────────────────────

[[nodes]]
id = "barracuda"
depends_on = ["beardog"]
output = "barracuda-ready"
capabilities = ["tensor", "math", "activation", "stats", "noise", "rng"]

[nodes.primal]
by_capability = "tensor"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
"math.sigmoid" = "math.sigmoid"
"math.log2" = "math.log2"
"activation.fitts" = "activation.fitts"
"activation.hick" = "activation.hick"
"stats.mean" = "stats.mean"
"stats.std_dev" = "stats.std_dev"
"stats.variance" = "stats.variance"
"noise.perlin2d" = "noise.perlin2d"
"rng.uniform" = "rng.uniform"
"tensor.create" = "tensor.create"
"tensor.matmul" = "tensor.matmul"

[[nodes]]
id = "toadstool"
depends_on = ["beardog", "songbird"]
output = "toadstool-ready"
capabilities = ["compute"]
fallback = "skip"

[nodes.primal]
by_capability = "compute"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 45000

[[nodes]]
id = "coralreef"
depends_on = ["beardog", "songbird"]
output = "coralreef-ready"
capabilities = ["shader"]
fallback = "skip"

[nodes.primal]
by_capability = "shader"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

# ── Nest Atomic ──────────────────────────────────────────────────────

[[nodes]]
id = "nestgate"
depends_on = ["beardog", "songbird"]
output = "nestgate-ready"
capabilities = ["storage"]

[nodes.primal]
by_capability = "storage"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[[nodes]]
id = "rhizocrypt"
depends_on = ["beardog", "songbird"]
output = "rhizocrypt-ready"
capabilities = ["dag", "provenance"]
fallback = "skip"

[nodes.primal]
by_capability = "dag"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[[nodes]]
id = "loamspine"
depends_on = ["beardog", "songbird"]
output = "loamspine-ready"
capabilities = ["ledger", "spine"]
fallback = "skip"

[nodes.primal]
by_capability = "ledger"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[[nodes]]
id = "sweetgrass"
depends_on = ["beardog", "songbird"]
output = "sweetgrass-ready"
capabilities = ["commit", "attribution"]
fallback = "skip"

[nodes.primal]
by_capability = "commit"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

# ── AI + Visualization ───────────────────────────────────────────────

[[nodes]]
id = "squirrel"
depends_on = ["beardog", "songbird"]
output = "squirrel-ready"
capabilities = ["ai", "inference"]
fallback = "skip"

[nodes.primal]
by_capability = "ai"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[[nodes]]
id = "petaltongue"
depends_on = ["beardog", "songbird"]
output = "petaltongue-ready"
capabilities = ["visualization", "interaction"]

[nodes.primal]
by_capability = "visualization"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 20000

[nodes.capabilities_provided]
"visualization.render" = "visualization.render"
"visualization.render.scene" = "visualization.render.scene"
"visualization.render.stream" = "visualization.render.stream"
"visualization.render.dashboard" = "visualization.render.dashboard"
"interaction.subscribe" = "interaction.subscribe"
"interaction.poll" = "interaction.poll"

# ── Validation ───────────────────────────────────────────────────────
# No ludospring node — game science is served by the composition of
# barraCuda (math/activation/stats/noise), Squirrel (AI), petalTongue
# (visualization/interaction), and the provenance trio.

[[nodes]]
id = "validate-cell"
depends_on = ["beardog", "songbird", "barracuda", "petaltongue"]
output = "cell-validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_barracuda = true
check_petaltongue = true
timeout_seconds = 20

[nodes.constraints]
timeout_ms = 30000
