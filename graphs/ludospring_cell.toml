#
# ludoSpring Cell Graph — full interactive desktop experience
#
# Defines the complete NUCLEUS cell for ludoSpring desktop gameplay.
# This is the composition that esotericWebb activates: a live game loop
# where petalTongue renders, the player interacts, and ludoSpring
# orchestrates science (flow, engagement, DDA) with provenance.
#
# Game tick loop (60 Hz target):
#   1. game.begin_session → session_id
#   2. game.tick (push scene → poll interaction → record action → metrics)
#   3. repeat step 2 until session ends
#   4. game.complete_session → loamSpine certificate
#
# Primals (14 nodes):
#   Tower:  BearDog (BTSP), Songbird (discovery)
#   Node:   barraCuda (tensor), coralReef (shader), ToadStool (compute)
#   Nest:   rhizoCrypt (DAG), loamSpine (ledger), sweetGrass (attribution)
#   Spring: ludoSpring (game science), petalTongue (live GUI)
#   AI:     Squirrel (NPC dialogue, narration)
#   Store:  NestGate (game state persistence)
#   Infra:  biomeOS (Neural API routing)
#
# STATUS: Active (Apr 25, 2026) — V51 typed composition, interaction loop

[graph]
id = "ludospring_cell"
description = "ludoSpring desktop game cell — full NUCLEUS with interaction loop"
coordination = "Sequential"

[graph.metadata]
resolve = true
fragments = ["tower_atomic", "node_atomic", "nest_atomic", "meta_tier"]
composition_model = "pure"
owner = "ludoSpring"
domain = "game_science"
transport = "uds_only"
btsp_enforced = true
tick_hz = 60

# ── Tower Atomic ─────────────────────────────────────────────────────

[[nodes]]
id = "beardog"
output = "beardog_genesis"
capabilities = ["security", "crypto"]

[nodes.primal]
by_capability = "security"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[[nodes]]
id = "songbird"
depends_on = ["beardog"]
output = "songbird_genesis"
capabilities = ["discovery", "network"]

[nodes.primal]
by_capability = "discovery"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

# ── Node Atomic ──────────────────────────────────────────────────────

[[nodes]]
id = "barracuda"
depends_on = ["beardog", "songbird"]
output = "barracuda_genesis"
capabilities = ["tensor", "math"]
fallback = "skip"

[nodes.primal]
by_capability = "tensor"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[[nodes]]
id = "coralreef"
