# ── Validation ───────────────────────────────────────────────────────

[[nodes]]
id = "validate_cell"
depends_on = ["beardog", "songbird", "ludospring", "petaltongue"]
output = "cell_validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_ludospring = true
check_petaltongue = true
timeout_seconds = 20

[nodes.constraints]
timeout_ms = 30000
