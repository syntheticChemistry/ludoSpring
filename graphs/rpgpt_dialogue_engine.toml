# SPDX-License-Identifier: AGPL-3.0-or-later
#
# RPGPT Dialogue Engine — NUCLEUS deployment for dialogue-plane RPGPT.
#
# Deploys the minimal stack for dialogue-plane RPGPT:
#   Tower (BearDog + Songbird) → ludoSpring (game science)
#   → petalTongue (game UI) → Squirrel (AI narration/NPC voices)
#   → toadStool (GPU inference, optional)
#   → Provenance Trio (session DAG, NPC certs, creative attribution)
#
# V37: Migrated from [[nodes]] to [[graph.node]] format with v2.80 conventions.
# All game.* capabilities now have demonstrated primal composition equivalents
# (exp089-098). esotericWebb can replicate this graph without ludoSpring node.
#
# Reference: primalSpring graphs/esotericwebb_composed_deploy.toml
#
# STATUS: Active (Mar 30, 2026) — V37 NUCLEUS composition

[graph]
name = "rpgpt_dialogue_engine"
version = "37.0"
description = "RPGPT Phase 1: Dialogue plane with NPC knowledge bounds, internal voices, passive checks, and petalTongue game UI"
coordination = "Sequential"

# ── Phase 1: Tower Atomic (security + discovery) ─────────────

[[graph.node]]
name = "beardog"
order = 0
by_capability = "security"
health_method = "health.check"
spawn = true
depends_on = []
capabilities = [
    "crypto.sign_ed25519",
    "crypto.verify_ed25519",
    "crypto.blake3_hash",
]

[[graph.node]]
name = "songbird"
order = 1
by_capability = "discovery"
health_method = "health.check"
spawn = true
depends_on = ["beardog"]
capabilities = [
    "discovery.register",
    "discovery.query",
]

# ── Phase 2: ludoSpring (game science — flow, DDA, engagement) ──

[[graph.node]]
name = "ludospring"
order = 2
by_capability = "game"
health_method = "health.liveness"
spawn = true
depends_on = ["songbird"]
capabilities = [
    "game.evaluate_flow",
    "game.engagement",
    "game.difficulty_adjustment",
    "game.begin_session",
    "game.record_action",
    "game.complete_session",
]

# ── Phase 3: petalTongue (game UI — dialogue tree, character sheet) ──

[[graph.node]]
name = "petaltongue"
order = 3
by_capability = "visualization"
health_method = "health.liveness"
spawn = true
depends_on = ["songbird"]
capabilities = [
    "visualization.render",
    "visualization.render.stream",
    "visualization.render.scene",
    "visualization.render.dashboard",
    "visualization.export",
    "ui.render",
    "interaction.subscribe",
    "interaction.poll",
]

# ── Phase 4: Squirrel (AI narration + NPC voices) ────────────

[[graph.node]]
name = "squirrel"
order = 4
by_capability = "ai"
health_method = "health.liveness"
spawn = true
depends_on = ["songbird", "petaltongue"]
capabilities = [
    "ai.chat",
    "ai.inference",
    "ai.summarize",
    "ai.list_providers",
]

# ── Phase 5: toadStool (GPU inference for Ollama, optional) ──

[[graph.node]]
name = "toadstool"
order = 5
by_capability = "compute"
health_method = "compute.health"
spawn = true
depends_on = ["squirrel"]
required = false
capabilities = [
    "compute.dispatch",
]

# ── Phase 6: Provenance Trio (session DAG + NPC certs + attribution) ──

[[graph.node]]
name = "rhizocrypt"
order = 6
by_capability = "provenance"
health_method = "health.liveness"
spawn = true
depends_on = ["beardog"]
required = false
capabilities = [
    "provenance.session_create",
    "provenance.vertex_append",
    "provenance.vertex_query",
]

[[graph.node]]
name = "loamspine"
order = 7
by_capability = "certificate"
health_method = "health.liveness"
spawn = true
depends_on = ["beardog"]
required = false
capabilities = [
    "certificate.mint",
    "certificate.query",
    "certificate.evolve",
]

[[graph.node]]
name = "sweetgrass"
order = 8
by_capability = "attribution"
health_method = "health.liveness"
spawn = true
depends_on = ["beardog"]
required = false
capabilities = [
    "attribution.record",
    "attribution.query",
]

# ── Phase 7: Validation ──────────────────────────────────────

[[graph.node]]
name = "validate_dialogue_engine"
order = 9
by_capability = "health"
health_method = "health.check"
spawn = false
depends_on = ["ludospring", "squirrel", "petaltongue"]
capabilities = []
