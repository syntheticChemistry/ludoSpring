# SPDX-License-Identifier: AGPL-3.0-or-later
#
# ludoSpring Deploy Graph — game-science primal atop Node Atomic.
#
# Deploys ludoSpring as a NUCLEUS science primal:
#   Tower (BearDog + Songbird) → ToadStool (GPU) → ludoSpring (game science)
#   → Validation → Provenance Trio (optional)
#
# ludoSpring registers 27 capabilities covering game science, provenance,
# AI narration, visualization, storage, certificates, DAG queries, GPU compute.
# V37: every game.* capability now has a demonstrated primal composition
# equivalent (exp089-098). The capability mapping in niche.rs decomposes
# each game.* to the underlying primal's native method.
#
# Continuous coordination readiness (game engine niche):
#   target_hz = 60, max_accumulator_ms = 250, budget_warning_ms = 14
#
# Reference: primalSpring graphs/ludospring_game_deploy.toml
#
# STATUS: Active (Mar 30, 2026) — V37 NUCLEUS composition

[graph]
name = "ludospring_deploy"
version = "37.0"
description = "ludoSpring game-science primal atop Node Atomic"
coordination = "Sequential"

[graph.metadata]
resolve = true
fragments = ["tower_atomic", "node_atomic", "nest_atomic", "meta_tier"]
composition_model = "pure"
owner = "ludoSpring"
domain = "game_science"
particle_profile = "balanced"
transport = "uds_only"
tcp_ports = 0
btsp_enforced = true

# ── Phase 1: Tower Atomic (security + network foundation) ────

[[graph.node]]
name = "beardog"
order = 0
by_capability = "security"
health_method = "health.check"
spawn = true
depends_on = []
capabilities = [
    "crypto.generate_keypair",
    "crypto.encrypt",
    "crypto.hash",
    "crypto.sign",
]

[[graph.node]]
name = "songbird"
order = 1
by_capability = "discovery"
health_method = "health.check"
spawn = true
depends_on = ["beardog"]
capabilities = [
    "network.http_request",
    "network.tls_connect",
    "discovery.announce",
    "discovery.query",
]

# ── Phase 2: ToadStool (GPU/CPU compute — optional) ─────────

[[graph.node]]
name = "toadstool"
order = 2
by_capability = "compute"
health_method = "compute.health"
spawn = true
depends_on = ["beardog", "songbird"]
required = false
capabilities = [
    "compute.health",
    "compute.execute",
    "compute.capabilities",
    "compute.dispatch.submit",
    "compute.dispatch.result",
    "compute.dispatch.capabilities",
]

# ── Phase 3: ludoSpring (game science primal) ────────────────

[[graph.node]]
name = "ludospring"
order = 3
by_capability = "game"
health_method = "health.liveness"
spawn = true
depends_on = ["beardog", "songbird"]
# NOTE: Subset of niche::CAPABILITIES (27 FQNs) — deploy graph lists core science capabilities only
capabilities = [
    "game.analyze_ui",
    "game.evaluate_flow",
    "game.fitts_cost",
    "game.engagement",
    "game.generate_noise",
    "game.wfc_step",
    "game.accessibility",
    "game.difficulty_adjustment",
    "game.begin_session",
    "game.record_action",
    "game.complete_session",
    "game.poll_telemetry",
]

# ── Phase 4: Validate ludoSpring Atomic ──────────────────────

[[graph.node]]
name = "validate_ludospring_atomic"
order = 4
by_capability = "health"
health_method = "health.check"
spawn = false
depends_on = ["beardog", "songbird", "ludospring"]
capabilities = []

# ── Phase 5: Provenance Trio (optional — enhances, never blocks) ──

[[graph.node]]
name = "provenance_session_start"
order = 5
by_capability = "provenance"
health_method = "health.liveness"
spawn = false
depends_on = ["validate_ludospring_atomic"]
required = false
capabilities = ["provenance.session_create"]

[[graph.node]]
name = "store_results"
order = 6
by_capability = "storage"
health_method = "health.liveness"
spawn = false
depends_on = ["provenance_session_start"]
required = false
capabilities = ["storage.store"]

[[graph.node]]
name = "provenance_commit"
order = 7
by_capability = "provenance"
health_method = "health.liveness"
spawn = false
depends_on = ["store_results"]
required = false
capabilities = ["provenance.session_dehydrate"]

[[graph.node]]
name = "provenance_attribute"
order = 8
by_capability = "attribution"
health_method = "health.liveness"
spawn = false
depends_on = ["provenance_commit"]
required = false
capabilities = ["contribution.recordDehydration"]
