# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: ${{ github.workspace }}/.cargo-target

jobs:
  ci:
    name: Format, lint, test, docs, deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87"
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Workspace check (all crates compile)
        run: cargo check --workspace

      - name: Test (barracuda + forge, incl. composition parity)
        run: |
          cargo test -p ludospring-barracuda --features ipc --lib --tests
          cargo test -p ludospring-forge --lib --tests

      - name: Composition targets drift check
        run: cargo run -p ludospring-barracuda --example check_composition_drift

      - name: Doc check
        run: cargo doc --workspace --no-deps

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo deny
        run: cargo deny check

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage (90% floor)
        run: >
          cargo llvm-cov
          --features ipc -p ludospring-barracuda
          --lib --tests
          --ignore-filename-regex 'bin/'
          --fail-under-lines 90

  baselines:
    name: Python baseline drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check baseline drift
        run: python3 baselines/python/check_drift.py
