[package]
name = "ludospring-exp061"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[[bin]]
name = "exp061_fermenting"
path = "src/main.rs"

[dependencies]
ludospring-barracuda = { path = "../../barracuda" }
serde_json = "1"
serde = { version = "1", features = ["derive"] }
uuid = { version = "1", features = ["v7"] }

# Provenance Trio — core crates (no service layer)
rhizo-crypt-core = { path = "../../../../primals/rhizoCrypt/crates/rhizo-crypt-core", default-features = false, features = [] }
loam-spine-core = { path = "../../../../primals/loamSpine/crates/loam-spine-core" }
sweet-grass-core = { path = "../../../../primals/sweetGrass/crates/sweet-grass-core" }

[lints]
workspace = true
